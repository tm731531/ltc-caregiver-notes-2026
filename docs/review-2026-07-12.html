<style>

.q.show .a{display:block}

<div class="top">
 <h1>✍️ 今日複習題 · 2026-07-12</h1>
 <div class="sub">身心障礙者 · 自立支援與復能 · 照顧者角色與壓力｜點題目顯示答案。此為當日課程複習，與官方考照題庫獨立。</div>
</div>
<div class="bar"><button class="rv" onclick="tg(true)">顯示全部答案</button>
 <button class="rv" onclick="tg(false)" style="background:#888;border-color:#888">隱藏全部</button></div>

<div id="quiz"></div>

<div class="foot">整理自 2026-07-12 課堂錄音＋投影片＋講義 · 詳見 <a href="https://github.com/tm731531/ltc-caregiver-notes-2026">筆記 repo</a></div>

<script>
const Q=[
 {s:"A. 身心障礙者",items:[
  ["身心障礙鑑定「新制」哪一天全面實施？","2012 年 7 月 11 日（以身體系統 ICF 分類）"],
  ["新制身心障礙分幾大類？舊制幾類？","新制 8 大類（八大身體系統）；舊制 16 類"],
  ["申請身心障礙證明要向哪個單位提出？","鄉鎮市區公所（再由衛生機關鑑定＋社政需求評估）"],
  ["身心障礙等級分哪四級？","輕度／中度／重度／極重度"],
  ["智能障礙 IQ 分級（課堂版）？","輕度 55–69／中度 40–54／重度 25–39／極重度 <25"],
  ["多重障礙：具 2 類以上「相同」等級如何判定？","綜合等級升一級（升一級為限）；不同等級則取較重"],
  ["自閉症三大核心障礙？","①社交互動障礙 ②語言/溝通障礙 ③重複/固著行為"],
  ["與聽障者溝通的要點（任舉三）？","口齒清晰放慢讓看口形、注視眼睛、環境安靜、學簡單手語、可筆談"],
  ["PBS 全名與核心精神？","正向行為支持 Positive Behavior Support；以獎勵取代處罰、獎多罰少"],
  ["PBS 問題行為的處理優先順序？","危害自己/他人 ＞ 干擾他人 ＞ 自我刺激（不專心）"],
  ["「笑的梯子／哭的梯子」是什麼？","代幣卡：笑=正向可累積兌換、哭=負向扣抵；貼顯眼處每日檢視"],
 ]},
 {s:"B. 自立支援與復能",items:[
  ["機構分類「安養／長照中心／護理之家」差在？","安養=短期住院式；長照中心=兩管；護理之家=三管"],
  ["肌少症的五公尺行走警訊標準？","6 秒內走完（<1 公尺/秒），慢於此即警訊"],
  ["肌少症 EWGSOP 三階段？","前期肌少症 → 肌少症 → 嚴重肌少症"],
  ["壓傷成因三要素？","持續壓力 ＋ 潮濕 ＋ 剪切力（NPUAP 2016 壓瘡→壓傷）"],
  ["壓傷 Stage I 的特徵？","皮膚完整、發紅且指壓不退（non-blanchable erythema）"],
  ["壓傷分期 Stage I–IV 各是？","Ⅰ皮膚完整發紅／Ⅱ部分皮層缺損起水泡／Ⅲ全皮層潰瘍壞死／Ⅳ深及肌肉骨頭"],
  ["翻身頻率與翻的方向？","每 2 小時一次；往「健側」翻（好手在上）"],
  ["翻身時照顧者兩手扶哪裡？力量作用於？","一手扶肩胛骨、一手扶臀部；力量作用於「關節」不壓在肉上"],
  ["床→輪椅轉位：輪椅擺幾度、第一步做什麼？","與床成 45°；第一步先「鎖煞車」，再拆腳架扶手"],
  ["側臥擺位，雙膝之間要放什麼？","夾一個枕頭（另手臂下墊枕、背後加枕支撐）"],
  ["巴氏量表（Barthel Index）評估什麼？","日常生活活動 ADL：吃飯/洗澡/修飾/穿脫/大小便/上廁所/移位/走路/上下樓（E1–E11）"],
  ["被動關節活動的操作原則？","固定近端關節、和緩移動遠端；遇阻力停 5–10 秒；每關節 10–20 下、每天 1–2 次"],
  ["吞嚥困難者，流質食物怎麼處理？","加濃稠劑（快凝寶）變半固；食物切碎但「不直接製成泥」（易噎）"],
 ]},
 {s:"術科考試（8/1）",items:[
  ["術科三大考項是哪三項？","①上肢關節運動（主動/被動）②下肢被動關節運動 ③轉移位（搬移/翻身）"],
  ["長照小卡（執照）幾年更新、需幾學分？","每 6 年更新、需 120 學分（建議到期前半年申請）"],
 ]},
 {s:"C. 照顧者角色與壓力",items:[
  ["照顧者的角色定位是？","協助者／指導者，不是傭人；提升個案自我照顧能力、不事事代勞"],
  ["照顧者壓力影響哪四個面向？","生理／心理（怨念與內疚並存）／社交／精神"],
  ["「身心靈全人健康」的三者？","身（身體）·心（情緒）·靈（生命意義/靈性），三者相互協調"],
  ["照顧者常見的減壓/支援方式？","喘息（暫托）服務、互助小組、尋求支援、自我照顧、健康練習"],
 ]},
];
const box=document.getElementById('quiz');let n=0;
Q.forEach(sec=>{
 const h=document.createElement('h2');h.textContent=sec.s;box.appendChild(h);
 sec.items.forEach(([q,a])=>{n++;
  const d=document.createElement('div');d.className='q';
  d.innerHTML=`<div><span class="qn">${n}.</span>${q}<span class="tap">▸點看答案</span></div><div class="a">✅ ${a}</div>`;
  d.querySelector('.tap').onclick=()=>d.classList.toggle('show');
  d.querySelector('div').style.cursor='pointer';
  d.querySelector('div').onclick=(e)=>{if(!e.target.classList.contains('tap'))d.classList.toggle('show')};
  box.appendChild(d);});
});
function tg(on){document.querySelectorAll('.q').forEach(q=>q.classList.toggle('show',on))}
</script>
</body></html>
